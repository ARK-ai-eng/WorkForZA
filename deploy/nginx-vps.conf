# /etc/nginx/sites-available/workforza
# Diese Datei auf den VPS kopieren und aktivieren:
#   sudo cp deploy/nginx-vps.conf /etc/nginx/sites-available/workforza
#   sudo ln -s /etc/nginx/sites-available/workforza /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS Weiterleitung (nach SSL-Setup aktivieren)
server {
    listen 80;
    server_name app.workforza.de;
    return 301 https://$host$request_uri;
}

# HTTPS (wird von Certbot automatisch befüllt)
server {
    listen 443 ssl http2;
    server_name app.workforza.de;

    # SSL-Zertifikate (von Certbot automatisch gesetzt)
    # ssl_certificate /etc/letsencrypt/live/app.workforza.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/app.workforza.de/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/workforza_access.log;
    error_log /var/log/nginx/workforza_error.log;

    # Proxy zum Docker-Container
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
